# Dependabot keeps the three dependency surfaces patched (R0 supply-chain).
# Grouped, weekly PRs so the security signal is not lost in churn.
version: 2
updates:
  # Python dependencies declared in pyproject.toml.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python-dev:
        patterns: ["ruff", "mypy", "pytest*", "hypothesis", "maturin", "nbmake", "ipykernel"]
      python-runtime:
        patterns: ["*"]
        exclude-patterns: ["ruff", "mypy", "pytest*", "hypothesis", "maturin", "nbmake", "ipykernel"]

  # Rust crate dependencies (pyo3 is security-sensitive — kept current).
  - package-ecosystem: "cargo"
    directory: "/rust"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # The GitHub Actions pinned in the CI and release workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
