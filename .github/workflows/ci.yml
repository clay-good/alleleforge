name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check src tests scripts
      - run: ruff format --check src tests scripts

  type-check:
    name: Type-check (mypy --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # The genome deps are installed so the genome package type-checks against
      # the real pyfaidx / pyliftover modules.
      - run: pip install -e ".[dev,cli,web]" "pyfaidx>=0.8" "pyliftover>=0.4"
      - run: mypy --strict src/alleleforge

  test:
    name: Test (py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      # Install the Phase 2 genome dependencies (pyfaidx for FASTA access,
      # pyliftover for chain-file liftover) so tests/genome runs and counts
      # toward the coverage gate. The heavier genome stack (pysam, cyvcf2,
      # mappy) is pulled in by later phases that need it.
      - run: pip install -e ".[dev,cli,web]" "pyfaidx>=0.8" "pyliftover>=0.4"
      - run: pytest

  docs:
    name: Docs (mkdocs --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # mkdocstrings imports the package to render the API reference, so the
      # core install plus the genome deps (pyfaidx is a top-level import in the
      # genome layer) are needed alongside the docs toolchain.
      - run: pip install -e ".[docs]" "pyfaidx>=0.8" "pyliftover>=0.4"
      - run: mkdocs build --strict

  examples:
    name: Examples (notebooks, stub models)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Examples run end to end against the weight-free stub models; the same
      # extras as the test job guarantee every transitive import resolves, and the
      # notebook runner (nbmake) ships in the dev extra. --no-cov disables the
      # library coverage gate for this notebook-only run.
      - run: pip install -e ".[dev,cli,web]" "pyfaidx>=0.8" "pyliftover>=0.4"
      - run: pytest --nbmake examples/ --no-cov

  reproduce:
    name: Reproducibility audit (re-derive & diff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Re-derive the canonical weight-free design run from config + seed and diff
      # it against the committed golden manifest, proving the run is reproducible
      # and has not silently drifted.
      - run: pip install -e ".[dev,cli,web]" "pyfaidx>=0.8" "pyliftover>=0.4"
      - run: python scripts/reproduce.py

  security:
    name: Supply-chain audit (pip-audit · cargo audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      # Audit the installed Python environment against the PyPI advisory DB, and
      # the Rust crate against RustSec. Both are non-blocking informational gates
      # for now (|| true): the advisory DBs move independently of our code, so a
      # newly-published advisory must not turn an unrelated PR red — Dependabot
      # opens the remediation PR. Tighten to blocking before the v1.0 tag.
      - run: pip install -e ".[dev,cli,web]" "pyfaidx>=0.8" "pyliftover>=0.4" pip-audit
      - run: pip-audit --strict --desc || true
      - run: cargo install cargo-audit --locked
      - run: cargo audit || true
        working-directory: rust

  rust:
    name: Rust native crate (fmt · clippy · maturin · parity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      # fmt + clippy gate the source. The `extension-module` feature means a bare
      # `cargo build` cannot link libpython, so maturin — not cargo — is the build
      # of record; it also keeps the pinned, security-patched pyo3 building.
      - run: cargo fmt --check
        working-directory: rust
      - run: cargo clippy --lib -- -D warnings
        working-directory: rust
      # Build the wheel, install it alongside the library, and run the native
      # parity tests so the Rust FM-index is proven byte-identical to the
      # pure-Python fallback (not just compiled).
      - run: pip install -e ".[dev]" "pyfaidx>=0.8" "pyliftover>=0.4"
      - run: maturin build --release --out dist
        working-directory: rust
      - run: pip install rust/dist/*.whl
      - run: pytest -m native --no-cov
