# Model card — optional long-context backbone (Caduceus).
name: caduceus
version: "1.0"
chemistry: null  # a generic long-context sequence backbone
training_data: >-
  Human reference genome, bi-directional (reverse-complement-equivariant)
  masked-language-model pre-training over long genomic windows.
metrics:
  context_window_tokens: 131072.0
intended_use: >-
  Long-context genomic sequence embedding for downstream guide-efficiency and
  edit-outcome models in AlleleForge. Research use.
