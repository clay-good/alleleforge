  Clinical decision-making; non-genomic sequence; any use implying experimental
  validation has been performed.
license: Apache-2.0
citation: "Schiff et al., 2024 (Caduceus: bi-directional equivariant long-range DNA)"
known_failure_modes:
  - "Single-species (human) pre-training; out of distribution for other taxa."
  - "Long-context strength is on regulatory/structural signal, not point efficiency."
