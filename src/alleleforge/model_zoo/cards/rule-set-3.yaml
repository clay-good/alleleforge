# Model card — bundled with AlleleForge (Phase 7 SpCas9 efficiency baseline).
name: rule-set-3
version: "1.0"
chemistry: cas9_nuclease
training_data: >-
  Pooled SpCas9 on-target activity screens (Rule Set 3 / sgRNA designer),
  including tracrRNA-aware features from DeWeirdt & Doench.
metrics:
  spearman_validation: 0.0  # populated when CRISPR-Bench scores it (Phase 14)
intended_use: >-
  On-target SpCas9 efficiency. The always-available baseline is a transparent
  feature model (no download); the trained Rule Set 3 LightGBM model loads on
  demand through the consent-gated model zoo. Research use.
out_of_scope_use: >-
  Clinical decision-making; chemistries other than SpCas9 nuclease; a substitute
  for experimental validation.
