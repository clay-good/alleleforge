# the version-independent text format (loads under any LightGBM; see
# scripts/export_rs3_booster.py for the exact, reproducible derivation).
license: Apache-2.0
citation: "DeWeirdt & Doench et al., Nat Commun 2022 (Rule Set 3); rs3 v0.0.18"
known_failure_modes:
  - "Trained on lentiviral pooled screens; may not transfer to other delivery/contexts."
  - "Reduced accuracy outside the trained spacer-length / scaffold assumptions."
  - "Requires a 30-nt context (4 nt 5' + 20 nt protospacer + 3 nt PAM + 3 nt 3')."
