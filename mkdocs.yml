site_name: AlleleForge
site_description: Variant-driven, multi-modality, uncertainty-aware CRISPR guide & edit design.
repo_url: https://github.com/clay-good/alleleforge
repo_name: clay-good/alleleforge
copyright: MIT-licensed. A research tool — not a medical device and not medical advice.

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.integrate

nav:
  - Home: index.md
  - Concepts:
      - Uncertainty contract: concepts/uncertainty.md
      - Population-aware safety: concepts/population.md
  - Data provenance: data.md
  - Reference:
      - Core types: api/types.md
      - Genome access: api/genome.md
      - Data registry & datasets: api/data.md
      - Variant resolver: api/variant.md
      - Off-target engine: api/offtarget.md
      - Scoring foundations: api/scoring.md
  - Scope & responsible use: scope.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            members_order: source
